name: Code Quality Checks

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black
          pip install flake8
          pip install isort

      - name: Run Black
        run: |
          black . --check

      - name: Run Isort
        run: |
          isort . --check-only

      - name: Run Flake8
        run: |
          flake8 .