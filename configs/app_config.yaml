application:
  name: HealthRisk AI
  version: 1.0.0
  environment: development
  debug: true

server:
  host: 0.0.0.0
  api_port: 8000
  dashboard_port: 8501

dashboard:
  title: HealthRisk AI Dashboard
  theme: dark
  sidebar_state: expanded
  page_icon: 🏥

security:
  secret_key: change_this_in_production
  token_expiration_minutes: 60
  cors_enabled: true

cache:
  enabled: true
  cache_directory: cache
  ttl_seconds: 3600

timezone:
  default: UTC

random_seed: 42